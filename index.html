<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaussian Splatting - 实时漫游 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; }

        /* 左上角信息面板 */
        #info {
            position: absolute;
            top: 16px; left: 16px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
            background: rgba(0,0,0,0.55);
            padding: 14px 18px;
            border-radius: 10px;
            pointer-events: none;
            line-height: 1.7;
            max-width: 300px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #info h1 { font-size: 15px; margin-bottom: 6px; font-weight: 600; }
        #info .tag {
            display: inline-block;
            background: rgba(59,130,246,0.25);
            color: #93c5fd;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            border: 1px solid rgba(59,130,246,0.3);
        }

        /* 左下角操作提示 */
        #controls-hint {
            position: absolute;
            bottom: 16px; left: 16px;
            color: rgba(255,255,255,0.85);
            font-family: sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08);
            line-height: 1.8;
        }
        .key {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin: 0 1px;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 20px;
            text-align: center;
        }

        /* 右上角坐标 HUD */
        #hud {
            position: absolute;
            top: 16px; right: 16px;
            color: #4ade80;
            font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(74,222,128,0.15);
            line-height: 1.8;
            min-width: 200px;
        }
        #hud .label { color: rgba(255,255,255,0.5); }
        #hud .value { color: #4ade80; float: right; }
        #hud .compass { color: #60a5fa; }
        #hud .speed-indicator { color: #fbbf24; }

        /* 屏幕中心十字准星 */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            pointer-events: none;
            z-index: 40;
            opacity: 0.7;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        #crosshair .dot {
            position: absolute;
            top: 8px; left: 8px;
            width: 4px; height: 4px;
            background: rgba(255,100,100,0.9);
            border-radius: 50%;
        }

        /* 加载动画 */
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 18px;
            text-align: center;
            z-index: 100;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading .sub {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 10px;
        }

        /* 模式提示 */
        #mode-toast {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            padding: 16px 32px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #mode-toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="crosshair"><div class="dot"></div></div>

    <div id="info">
        <h1>3DGS 实时漫游 Demo</h1>
        <div><span class="tag">场景</span> Train（Tanks and Temples）</div>
        <div><span class="tag">迭代</span> 30,000 steps</div>
        <div><span class="tag">高斯</span> ~108万</div>
        <div style="margin-top:6px;opacity:0.7;font-size:11px;">
            左键旋转 · 滚轮缩放 · 右键平移<br>
            WASD/方向键行走 · Shift 加速
        </div>
    </div>

    <div id="hud">
        <div><span class="label">游客坐标</span></div>
        <div>X <span class="value" id="pos-x">0.00</span></div>
        <div>Y <span class="value" id="pos-y">0.00</span></div>
        <div>Z <span class="value" id="pos-z">0.00</span></div>
        <div style="margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;">
            <span class="label compass">朝向</span>
            <span class="value compass" id="compass">N 0°</span>
        </div>
        <div>
            <span class="label speed-indicator">移速</span>
            <span class="value speed-indicator" id="speed-indicator">正常</span>
        </div>
    </div>

    <div id="controls-hint">
        <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> / <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 移动</div>
        <div><span class="key">Shift</span> 加速 · <span class="key">C</span> 切换光标</div>
        <div><span class="key">I</span> 调试信息 · <span class="key">P</span> 点云模式</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div>正在加载 3D 高斯场景...</div>
        <div class="sub">首次加载约 15-30 秒 · 请耐心等待</div>
    </div>

    <div id="mode-toast"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "./node_modules/three/build/three.module.js",
            "@mkkellogg/gaussian-splats-3d": "./node_modules/@mkkellogg/gaussian-splats-3d/build/gaussian-splats-3d.module.js"
        }
    }
    </script>
    <script type="module">
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const modeToast = document.getElementById('mode-toast');

        // ===== Three.js 场景辅助对象 =====
        const threeScene = new THREE.Scene();

        // 地面网格：帮助判断方向和地面位置
        const gridHelper = new THREE.GridHelper(40, 40, 0x555555, 0x333333);
        // 场景Y轴负方向为上，地面约在Y=0，把网格放在稍微"下方"一点避免z-fighting
        gridHelper.position.set(0, 0.02, 0);
        threeScene.add(gridHelper);

        // 参考平面（半透明地面）
        const planeGeo = new THREE.PlaneGeometry(200, 200);
        const planeMat = new THREE.MeshBasicMaterial({
            color: 0x0a0a0a,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.4
        });
        const groundPlane = new THREE.Mesh(planeGeo, planeMat);
        // 平面默认是竖直的，需要旋转为水平
        // 根据cameraUp，Y轴负方向为上。这里我们让平面平铺在Y=0
        groundPlane.rotation.x = Math.PI; // 翻转一下
        groundPlane.position.set(0, 0.01, 0);
        threeScene.add(groundPlane);

        // 坐标轴辅助（小巧一点）
        const axesHelper = new THREE.AxesHelper(2);
        axesHelper.position.set(0, 0.05, 0);
        threeScene.add(axesHelper);

        // ===== Viewer 初始化 =====
        // 场景Y轴负方向为上，地面约在Y=0，人眼高度约Y=-1.6（比地面高1.6个单位）
        const viewer = new GaussianSplats3D.Viewer({
            'rootElement': container,
            'threeScene': threeScene,
            'cameraUp': [0, -1, -0.6],
            // 初始位置：站在场景中后方，高度-1.6（地面以上），平视前方
            'initialCameraPosition': [0, -1.6, 8],
            'initialCameraLookAt': [0, -1.6, 0],
            'sharedMemoryForWorkers': false,
            'gpuAcceleratedSort': false,
            'integerBasedSort': true,
            'sphericalHarmonicsDegree': 0,
            'sceneRevealMode': GaussianSplats3D.SceneRevealMode.Gradual,
            'antialiased': false
        });

        // ===== 键盘状态 =====
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            keys[e.code] = true;
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            keys[e.code] = false;
        });

        // ===== 游客漫游系统 =====
        const moveSpeedNormal = 0.04;
        const moveSpeedFast = 0.10;
        // 人眼高度范围：Y轴负方向为上，所以数值越小越高
        // 地面约Y=0，人眼应在Y=-1.4 ~ -1.8之间（高于地面）
        const eyeHeight = -1.6;
        const minHeight = -2.2;  // 最低（最高处）
        const maxHeight = -0.8;  // 最高（最低处，接近地面）

        const tmpVec = new THREE.Vector3();
        const tmpForward = new THREE.Vector3();
        const tmpRight = new THREE.Vector3();
        const tmpUp = new THREE.Vector3(0, 1, 0);

        function showToast(msg) {
            modeToast.textContent = msg;
            modeToast.classList.add('show');
            setTimeout(() => modeToast.classList.remove('show'), 1500);
        }

        function getCompassHeading(direction) {
            // 计算偏航角（相对于Z轴负方向）
            const angle = Math.atan2(direction.x, direction.z);
            let deg = angle * (180 / Math.PI);
            deg = (deg + 360) % 360;
            // 转换为指南针方向
            const dirs = ['N','NE','E','SE','S','SW','W','NW'];
            const idx = Math.round(deg / 45) % 8;
            return `${dirs[idx]} ${Math.round(deg)}°`;
        }

        function updateMovement() {
            if (!viewer.camera || !viewer.controls) return;

            const camera = viewer.camera;
            const controls = viewer.controls;
            const isShift = keys['Shift'] || keys['ShiftLeft'] || keys['ShiftRight'];
            const speed = isShift ? moveSpeedFast : moveSpeedNormal;

            // 获取相机水平朝向（忽略俯仰，只看偏航）
            camera.getWorldDirection(tmpForward);
            // 保持水平：在这个坐标系里，Y轴负方向是上，所以水平面是XZ平面
            // 我们把Y分量归0，然后重新归一化
            const originalY = tmpForward.y;
            tmpForward.y = 0;
            if (tmpForward.lengthSq() < 0.0001) {
                // 如果相机垂直朝天/地，用默认前方（-Z方向）
                tmpForward.set(0, 0, -1);
            }
            tmpForward.normalize();

            // 右向量 = forward × worldUp
            tmpRight.crossVectors(tmpForward, tmpUp).normalize();

            let moved = false;
            tmpVec.set(0, 0, 0);

            if (keys['w'] || keys['W'] || keys['ArrowUp']) {
                tmpVec.addScaledVector(tmpForward, speed);
                moved = true;
            }
            if (keys['s'] || keys['S'] || keys['ArrowDown']) {
                tmpVec.addScaledVector(tmpForward, -speed);
                moved = true;
            }
            if (keys['a'] || keys['A'] || keys['ArrowLeft']) {
                tmpVec.addScaledVector(tmpRight, -speed);
                moved = true;
            }
            if (keys['d'] || keys['D'] || keys['ArrowRight']) {
                tmpVec.addScaledVector(tmpRight, speed);
                moved = true;
            }

            if (moved) {
                // 同时移动相机和焦点，保持 orbit 的相对关系
                camera.position.add(tmpVec);
                controls.target.add(tmpVec);
            }

            // 强制保持人眼高度：始终让相机Y处于eyeHeight附近
            // 这样玩家不会飞天或入地
            if (camera.position.y > maxHeight) {
                const fix = maxHeight - camera.position.y;
                camera.position.y += fix;
                controls.target.y += fix;
            }
            if (camera.position.y < minHeight) {
                const fix = minHeight - camera.position.y;
                camera.position.y += fix;
                controls.target.y += fix;
            }

            // 让相机始终平视（目标点与相机同高度）
            // 这样鼠标旋转时不会上下乱翻
            controls.target.y = camera.position.y;

            // 更新 HUD
            document.getElementById('pos-x').textContent = camera.position.x.toFixed(2);
            document.getElementById('pos-y').textContent = camera.position.y.toFixed(2);
            document.getElementById('pos-z').textContent = camera.position.z.toFixed(2);

            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            document.getElementById('compass').textContent = getCompassHeading(camDir);
            document.getElementById('speed-indicator').textContent = isShift ? '加速 ⚡' : '正常';
            document.getElementById('speed-indicator').style.color = isShift ? '#f87171' : '#fbbf24';
        }

        // ===== 启动游戏循环 =====
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            updateMovement();
        }

        // ===== 加载场景 =====
        viewer.addSplatScene('./models/train.ply', {
            'splatAlphaRemovalThreshold': 5,
            'showLoadingUI': false,
            'position': [0, 0, 0],
            'rotation': [0, 0, 0, 1],
            'scale': [1, 1, 1]
        })
        .then(() => {
            loading.style.display = 'none';
            viewer.start();
            gameLoop();
            showToast('🎮 WASD 开始漫游 · 地面在脚下');
        })
        .catch((err) => {
            loading.innerHTML = '<div style="color:#ff6b6b">加载失败: ' + err.message + '</div>';
            console.error(err);
        });
    </script>
</body>
</html>
