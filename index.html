<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaussian Splatting - 实时漫游 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; }
        #info {
            position: absolute;
            top: 16px;
            left: 16px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 8px;
            pointer-events: none;
            line-height: 1.6;
            max-width: 320px;
        }
        #info h1 { font-size: 16px; margin-bottom: 6px; }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 18px;
            text-align: center;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="info">
        <h1>3DGS 实时漫游 Demo</h1>
        <div>场景：Train（Tanks and Temples）</div>
        <div>训练迭代：30,000</div>
        <div style="margin-top:6px;opacity:0.8;font-size:12px;">
            左键拖拽旋转 · 滚轮缩放 · 右键平移
        </div>
    </div>
    <div id="loading">
        <div class="spinner"></div>
        <div>正在加载 3D 高斯模型...</div>
        <div style="font-size:12px;opacity:0.7;margin-top:8px;">首次加载约 15-30 秒</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "./node_modules/three/build/three.module.js",
            "@mkkellogg/gaussian-splats-3d": "./node_modules/@mkkellogg/gaussian-splats-3d/build/gaussian-splats-3d.module.js"
        }
    }
    </script>
    <script type="module">
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');

        const viewer = new GaussianSplats3D.Viewer({
            'rootElement': container,
            'cameraUp': [0, -1, -0.6],
            'initialCameraPosition': [-1, -4, 6],
            'initialCameraLookAt': [0, 4, 0],
            'sharedMemoryForWorkers': false,
            'gpuAcceleratedSort': false,
            'integerBasedSort': true,
            'sphericalHarmonicsDegree': 0,
            'sceneRevealMode': GaussianSplats3D.SceneRevealMode.Gradual,
            'antialiased': false
        });

        viewer.addSplatScene('./models/train.ply', {
            'splatAlphaRemovalThreshold': 5,
            'showLoadingUI': false,
            'position': [0, 0, 0],
            'rotation': [0, 0, 0, 1],
            'scale': [1, 1, 1]
        })
        .then(() => {
            loading.style.display = 'none';
            viewer.start();
        })
        .catch((err) => {
            loading.innerHTML = '<div style="color:#ff6b6b">加载失败: ' + err.message + '</div>';
            console.error(err);
        });
    </script>
</body>
</html>
