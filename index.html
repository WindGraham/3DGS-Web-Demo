<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaussian Splatting - 实时漫游 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; }

        /* 左上角信息面板 */
        #info {
            position: absolute;
            top: 16px; left: 16px;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 13px;
            background: rgba(0,0,0,0.55);
            padding: 14px 18px;
            border-radius: 10px;
            pointer-events: none;
            line-height: 1.7;
            max-width: 300px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #info h1 { font-size: 15px; margin-bottom: 6px; font-weight: 600; }
        #info .tag {
            display: inline-block;
            background: rgba(59,130,246,0.25);
            color: #93c5fd;
            padding: 1px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            border: 1px solid rgba(59,130,246,0.3);
        }

        /* 左下角操作提示 */
        #controls-hint {
            position: absolute;
            bottom: 16px; left: 16px;
            color: rgba(255,255,255,0.85);
            font-family: sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.08);
            line-height: 1.8;
        }
        .key {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin: 0 1px;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 20px;
            text-align: center;
        }

        /* 右上角坐标 HUD */
        #hud {
            position: absolute;
            top: 16px; right: 16px;
            color: #4ade80;
            font-family: "SF Mono", Monaco, "Cascadia Code", "Roboto Mono", Consolas, monospace;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 12px 16px;
            border-radius: 10px;
            pointer-events: none;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(74,222,128,0.15);
            line-height: 1.8;
            min-width: 200px;
        }
        #hud .label { color: rgba(255,255,255,0.5); }
        #hud .value { color: #4ade80; float: right; }
        #hud .compass { color: #60a5fa; }
        #hud .speed-indicator { color: #fbbf24; }

        /* 屏幕中心十字准星 */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 20px; height: 20px;
            pointer-events: none;
            z-index: 40;
            opacity: 0.7;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        #crosshair .dot {
            position: absolute;
            top: 8px; left: 8px;
            width: 4px; height: 4px;
            background: rgba(255,100,100,0.9);
            border-radius: 50%;
        }

        /* 加载动画 */
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 18px;
            text-align: center;
            z-index: 100;
        }
        .spinner {
            width: 44px; height: 44px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading .sub {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 10px;
        }

        /* 模式提示 */
        #mode-toast {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-family: sans-serif;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            padding: 16px 32px;
            border-radius: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        #mode-toast.show { opacity: 1; }
        .photo-mode #info,
        .photo-mode #hud,
        .photo-mode #controls-hint,
        .photo-mode #mode-bar,
        .photo-mode #guide-panel,
        .photo-mode #radar-panel,
        .photo-mode #crosshair { display: none; }
        #mode-bar {
            position: absolute;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 60;
            font-family: sans-serif;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
            backdrop-filter: blur(4px);
        }
        .mode-btn, .panel-btn {
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.9);
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .mode-btn.active, .panel-btn:hover {
            background: rgba(59,130,246,0.45);
            border-color: rgba(147,197,253,0.55);
        }
        #guide-panel {
            position: absolute;
            right: 16px; top: 188px;
            width: 280px;
            max-height: calc(100vh - 220px);
            overflow: auto;
            color: #fff;
            font-family: sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.56);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px;
            z-index: 55;
            backdrop-filter: blur(4px);
        }
        .panel-section + .panel-section { margin-top: 14px; }
        .panel-title {
            color: rgba(255,255,255,0.72);
            font-size: 11px;
            margin-bottom: 7px;
            letter-spacing: 0;
        }
        .panel-list { display: grid; gap: 6px; }
        .panel-btn {
            width: 100%;
            text-align: left;
            line-height: 1.35;
        }
        #poi-detail {
            margin-top: 8px;
            color: rgba(255,255,255,0.82);
            line-height: 1.55;
        }
        #radar-panel {
            position: absolute;
            left: 16px; bottom: 104px;
            width: 150px;
            color: rgba(255,255,255,0.8);
            font-family: sans-serif;
            font-size: 11px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            z-index: 54;
            backdrop-filter: blur(4px);
        }
        #radar {
            display: block;
            width: 128px;
            height: 128px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        #radar-label { margin-top: 6px; text-align: center; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="crosshair"><div class="dot"></div></div>

    <div id="info">
        <h1>3DGS 实时漫游 Demo</h1>
        <div><span class="tag">场景</span> Train（Tanks and Temples）</div>
        <div><span class="tag">迭代</span> 30,000 steps</div>
        <div><span class="tag">高斯</span> ~108万</div>
        <div style="margin-top:6px;opacity:0.7;font-size:11px;">
            左键拖动转头 · 右键对准点击点<br>
            WASD 移动 · F 拍照 · M 切鼠标方向
        </div>
    </div>

    <div id="hud">
        <div><span class="label">游客坐标</span></div>
        <div>X <span class="value" id="pos-x">0.00</span></div>
        <div>Y <span class="value" id="pos-y">0.00</span></div>
        <div>Z <span class="value" id="pos-z">0.00</span></div>
        <div style="margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;">
            <span class="label compass">朝向</span>
            <span class="value compass" id="compass">N 0°</span>
        </div>
        <div>
            <span class="label speed-indicator">移速</span>
            <span class="value speed-indicator" id="speed-indicator">正常</span>
        </div>
    </div>

    <div id="controls-hint">
        <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移动 · <span class="key">Shift</span> 加速</div>
        <div><span class="key">Q</span>/<span class="key">E</span> 下降/上升 · <span class="key">Z</span>/<span class="key">C</span> 画面逆/顺时针旋转</div>
        <div><span class="key">X</span> 画面回正 · <span class="key">F</span> 保存当前视角照片</div>
    </div>

    <div id="mode-bar">
        <button class="mode-btn active" data-mode="free">自由</button>
        <button class="mode-btn" data-mode="tour">导览</button>
        <button class="mode-btn" data-mode="photo">拍照</button>
    </div>

    <div id="guide-panel">
        <div class="panel-section">
            <div class="panel-title">POI 讲解</div>
            <div class="panel-list" id="poi-list">
                <button class="panel-btn">车头观测点</button>
                <button class="panel-btn">车身侧面</button>
                <button class="panel-btn">轨道与地面</button>
            </div>
            <div id="poi-detail">选择一个点位查看讲解。</div>
        </div>
        <div class="panel-section">
            <div class="panel-title">视角书签</div>
            <div class="panel-list" id="bookmark-list">
                <button class="panel-btn">入口视角</button>
                <button class="panel-btn">侧面视角</button>
            </div>
        </div>
        <div class="panel-section">
            <div class="panel-title">照片</div>
            <div class="panel-list" id="photo-list"></div>
        </div>
    </div>

    <div id="radar-panel">
        <canvas id="radar" width="128" height="128"></canvas>
        <div id="radar-label">导航雷达</div>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <div>正在加载 3D 高斯场景...</div>
        <div class="sub">首次加载约 15-30 秒 · 请耐心等待</div>
    </div>

    <div id="mode-toast"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "./node_modules/three/build/three.module.js",
            "@mkkellogg/gaussian-splats-3d": "./node_modules/@mkkellogg/gaussian-splats-3d/build/gaussian-splats-3d.module.js"
        }
    }
    </script>
    <script type="module">
        import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';
        import * as THREE from 'three';

        const container = document.getElementById('canvas-container');
        const loading = document.getElementById('loading');
        const modeToast = document.getElementById('mode-toast');
        const poiList = document.getElementById('poi-list');
        const poiDetail = document.getElementById('poi-detail');
        const bookmarkList = document.getElementById('bookmark-list');
        const photoList = document.getElementById('photo-list');
        const radarCanvas = document.getElementById('radar');
        const radarCtx = radarCanvas.getContext('2d');
        const modeButtons = document.querySelectorAll('.mode-btn');

        // ===== Three.js 场景辅助对象 =====
        const threeScene = new THREE.Scene();

        // 调试网格只作为方向参考，不能写入深度，否则会遮挡 3DGS 点云。
        const gridHelper = new THREE.GridHelper(40, 40, 0x555555, 0x333333);
        gridHelper.position.set(0, 0.02, 0);
        gridHelper.material.depthWrite = false;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        threeScene.add(gridHelper);

        // 坐标轴辅助（小巧一点）
        const axesHelper = new THREE.AxesHelper(2);
        axesHelper.position.set(0, 0.05, 0);
        threeScene.add(axesHelper);

        // ===== Viewer 初始化 =====
        // Train 模型来自 COLMAP/3DGS，世界坐标未做真实地面标定。
        // 这里先固定相机高度，保证 WASD 漫游不会上下漂移。
        const viewer = new GaussianSplats3D.Viewer({
            'rootElement': container,
            'threeScene': threeScene,
            'cameraUp': [0, -1, 0],
            // 初始位置：站在场景中后方，保持平视。高度可用 Q/E 微调。
            'initialCameraPosition': [0, -0.25, 8],
            'initialCameraLookAt': [0, -0.25, 0],
            'sharedMemoryForWorkers': false,
            'gpuAcceleratedSort': false,
            'integerBasedSort': true,
            'sphericalHarmonicsDegree': 0,
            'sceneRevealMode': GaussianSplats3D.SceneRevealMode.Gradual,
            'antialiased': false
        });

        // ===== 键盘状态 =====
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            keys[e.code] = true;
            if ((e.key === 'm' || e.key === 'M') && !e.repeat) {
                mouseDirection *= -1;
                showToast(mouseDirection > 0 ? '鼠标方向：模式 A' : '鼠标方向：模式 B');
            }
            if ((e.key === 'f' || e.key === 'F') && !e.repeat) {
                capturePhoto();
            }
            if (e.key === 'Escape') {
                setMode('free');
            }
            if (["Space"].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            keys[e.code] = false;
        });

        // ===== 游客漫游系统 =====
        const moveSpeedNormal = 0.04;
        const moveSpeedFast = 0.10;
        const eyeHeight = -0.25;
        const heightStep = 0.05;
        let lockedHeight = eyeHeight;

        const tmpVec = new THREE.Vector3();
        const tmpForward = new THREE.Vector3();
        const tmpRight = new THREE.Vector3();
        const lookDirection = new THREE.Vector3();
        const lookTarget = new THREE.Vector3();
        const baseCameraUp = new THREE.Vector3(0, -1, 0);
        const rolledCameraUp = new THREE.Vector3();
        const rollQuaternion = new THREE.Quaternion();
        const lookDistance = 10;
        const mouseSensitivity = 0.003;
        const rollSpeed = 0.035;
        const pitchLimit = Math.PI / 2 - 0.08;
        let yaw = Math.PI;
        let pitch = 0;
        let roll = 0;
        let mouseDirection = -1;
        let isCapturing = false;
        let isDraggingLook = false;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let appMode = 'free';
        let tourSegment = 0;
        let tourProgress = 0;
        let lastFrameTime = performance.now();
        const savedPhotos = [];

        const pois = [
            {
                id: 'front',
                title: '车头观测点',
                position: new THREE.Vector3(-1.8, -0.25, 0.8),
                text: '这里用于观察 Train 场景的主体结构。3DGS 会把多视角照片重建成大量可实时渲染的高斯椭球。'
            },
            {
                id: 'side',
                title: '车身侧面',
                position: new THREE.Vector3(2.2, -0.25, 1.6),
                text: '侧面区域适合观察 3DGS 对细长结构、边缘和遮挡关系的表达效果。'
            },
            {
                id: 'track',
                title: '轨道与地面',
                position: new THREE.Vector3(0.4, -0.15, 3.8),
                text: '地面与轨道能体现重建的几何连续性，也能暴露当前场景尚未做真实地面标定的问题。'
            },
            {
                id: 'overview',
                title: '整体导览视角',
                position: new THREE.Vector3(0, -0.8, 6.2),
                text: '从这里可以快速进入导览路线，展示从自由漫游到自动讲解的完整体验。'
            }
        ];

        const bookmarks = [
            { title: '入口视角', position: [0, -0.25, 8], yaw: Math.PI, pitch: 0, roll: 0 },
            { title: '侧面视角', position: [3.2, -0.25, 4.5], yaw: -2.35, pitch: 0.02, roll: 0 },
            { title: '近景视角', position: [-1.6, -0.25, 2.1], yaw: 2.85, pitch: -0.03, roll: 0 },
            { title: '俯看视角', position: [0, -1.45, 5.2], yaw: Math.PI, pitch: 0.32, roll: 0 }
        ];

        const tourRoute = [
            { position: [0, -0.25, 8], yaw: Math.PI, pitch: 0, duration: 3.5, poi: 3 },
            { position: [-1.8, -0.25, 3.6], yaw: 2.75, pitch: 0, duration: 4.0, poi: 0 },
            { position: [2.7, -0.25, 3.0], yaw: -2.45, pitch: 0, duration: 4.0, poi: 1 },
            { position: [0.5, -0.18, 5.0], yaw: Math.PI, pitch: 0.08, duration: 4.0, poi: 2 }
        ];

        function showToast(msg) {
            modeToast.textContent = msg;
            modeToast.classList.add('show');
            setTimeout(() => modeToast.classList.remove('show'), 1500);
        }

        function speak(text) {
            if (!('speechSynthesis' in window)) {
                showToast('当前浏览器不支持语音讲解');
                return;
            }
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.95;
            window.speechSynthesis.speak(utterance);
        }

        function setMode(mode) {
            appMode = mode;
            document.body.classList.toggle('photo-mode', mode === 'photo');
            modeButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.mode === mode);
            });
            if (mode === 'tour') {
                tourSegment = 0;
                tourProgress = 0;
                showToast('导览模式');
            } else if (mode === 'photo') {
                showToast('拍照模式：按 F 保存');
            } else {
                showToast('自由模式');
            }
        }

        function setView(view) {
            if (!viewer.camera) return;
            viewer.camera.position.fromArray(view.position);
            lockedHeight = view.position[1];
            yaw = view.yaw;
            pitch = view.pitch || 0;
            roll = view.roll || 0;
            applyFirstPersonLook();
        }

        function selectPOI(index, shouldSpeak = true) {
            const poi = pois[index];
            if (!poi) return;
            poiDetail.innerHTML = `<strong>${poi.title}</strong><br>${poi.text}`;
            const target = poi.position;
            const camera = viewer.camera;
            if (camera) {
                const direction = target.clone().sub(camera.position).normalize();
                yaw = Math.atan2(direction.x, direction.z);
                pitch = Math.asin(clamp(direction.y, -1, 1));
                roll = 0;
                applyFirstPersonLook();
            }
            if (shouldSpeak) speak(`${poi.title}。${poi.text}`);
        }

        function buildPanelLists() {
            poiList.innerHTML = '';
            pois.forEach((poi, index) => {
                const button = document.createElement('button');
                button.className = 'panel-btn';
                button.textContent = poi.title;
                button.addEventListener('click', () => selectPOI(index));
                poiList.appendChild(button);
            });

            bookmarkList.innerHTML = '';
            bookmarks.forEach((bookmark) => {
                const button = document.createElement('button');
                button.className = 'panel-btn';
                button.textContent = bookmark.title;
                button.addEventListener('click', () => setView(bookmark));
                bookmarkList.appendChild(button);
            });

            renderPhotoList();
        }

        function renderPhotoList() {
            photoList.innerHTML = '';
            if (savedPhotos.length === 0) {
                const empty = document.createElement('div');
                empty.style.color = 'rgba(255,255,255,0.55)';
                empty.textContent = '暂无照片';
                photoList.appendChild(empty);
                return;
            }
            savedPhotos.slice().reverse().forEach((file) => {
                const button = document.createElement('button');
                button.className = 'panel-btn';
                button.textContent = file;
                photoList.appendChild(button);
            });
        }

        function createPOIMarkers() {
            const markerGeo = new THREE.SphereGeometry(0.08, 16, 12);
            pois.forEach((poi) => {
                const marker = new THREE.Mesh(
                    markerGeo,
                    new THREE.MeshBasicMaterial({
                        color: 0xfbbf24,
                        depthWrite: false,
                        transparent: true,
                        opacity: 0.9
                    })
                );
                marker.position.copy(poi.position);
                threeScene.add(marker);
            });
        }

        function getCompassHeading(direction) {
            // 计算偏航角（相对于Z轴负方向）
            const angle = Math.atan2(direction.x, direction.z);
            let deg = angle * (180 / Math.PI);
            deg = (deg + 360) % 360;
            // 转换为指南针方向
            const dirs = ['N','NE','E','SE','S','SW','W','NW'];
            const idx = Math.round(deg / 45) % 8;
            return `${dirs[idx]} ${Math.round(deg)}°`;
        }

        function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function syncLookAnglesFromCamera() {
            if (!viewer.camera) return;
            viewer.camera.getWorldDirection(lookDirection);
            yaw = Math.atan2(lookDirection.x, lookDirection.z);
            pitch = Math.asin(clamp(lookDirection.y, -1, 1));
        }

        function applyFirstPersonLook() {
            if (!viewer.camera || !viewer.controls) return;
            const camera = viewer.camera;
            const controls = viewer.controls;
            const cosPitch = Math.cos(pitch);

            lookDirection.set(
                Math.sin(yaw) * cosPitch,
                Math.sin(pitch),
                Math.cos(yaw) * cosPitch
            ).normalize();

            rolledCameraUp.copy(baseCameraUp);
            rolledCameraUp.addScaledVector(lookDirection, -rolledCameraUp.dot(lookDirection));
            if (rolledCameraUp.lengthSq() < 0.0001) {
                rolledCameraUp.set(0, 0, 1);
            }
            rolledCameraUp.normalize();
            rollQuaternion.setFromAxisAngle(lookDirection, roll);
            rolledCameraUp.applyQuaternion(rollQuaternion);
            camera.up.copy(rolledCameraUp);

            lookTarget.copy(camera.position).addScaledVector(lookDirection, lookDistance);
            controls.target.copy(lookTarget);
            camera.lookAt(lookTarget);
        }

        function alignLookToScreenPoint(clientX, clientY) {
            if (!viewer.camera) return;
            const rect = container.getBoundingClientRect();
            const normalizedX = ((clientX - rect.left) / rect.width) * 2 - 1;
            const normalizedY = -(((clientY - rect.top) / rect.height) * 2 - 1);
            const camera = viewer.camera;
            const clickDirection = new THREE.Vector3(normalizedX, normalizedY, 0.5)
                .unproject(camera)
                .sub(camera.position)
                .normalize();

            yaw = Math.atan2(clickDirection.x, clickDirection.z);
            pitch = Math.asin(clamp(clickDirection.y, -1, 1));
            roll = 0;
            applyFirstPersonLook();
        }

        function waitForFrame() {
            return new Promise((resolve) => requestAnimationFrame(() => resolve()));
        }

        async function capturePhoto() {
            if (isCapturing || !viewer.renderer) return;
            isCapturing = true;
            showToast('正在精细渲染并保存...');

            const renderer = viewer.renderer;
            const canvas = renderer.domElement;
            const oldPixelRatio = renderer.getPixelRatio();
            const oldSize = new THREE.Vector2();
            renderer.getSize(oldSize);
            const capturePixelRatio = Math.min(Math.max(oldPixelRatio * 2, 2), 3);

            try {
                renderer.setPixelRatio(capturePixelRatio);
                renderer.setSize(oldSize.x, oldSize.y, false);
                applyFirstPersonLook();
                if (typeof viewer.update === 'function') viewer.update();
                await waitForFrame();
                if (typeof viewer.update === 'function') viewer.update();
                await waitForFrame();

                const image = canvas.toDataURL('image/png');
                const response = await fetch('/api/screenshot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image })
                });
                const result = await response.json();
                if (!result.ok) throw new Error(result.error || '保存失败');
                savedPhotos.push(result.file);
                renderPhotoList();
                showToast(`已保存：${result.file}`);
            } catch (err) {
                console.error(err);
                showToast(`拍照失败：${err.message}`);
            } finally {
                renderer.setPixelRatio(oldPixelRatio);
                renderer.setSize(oldSize.x, oldSize.y, false);
                isCapturing = false;
            }
        }

        container.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            e.stopImmediatePropagation();
        }, true);
        container.addEventListener('mousedown', (e) => {
            e.stopImmediatePropagation();
            if (e.button === 2) {
                alignLookToScreenPoint(e.clientX, e.clientY);
                e.preventDefault();
                return;
            }
            if (e.button !== 0) return;
            isDraggingLook = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            e.preventDefault();
        }, true);
        window.addEventListener('mouseup', (e) => {
            isDraggingLook = false;
            e.stopImmediatePropagation();
        }, true);
        window.addEventListener('mousemove', (e) => {
            if (!isDraggingLook) return;
            e.stopImmediatePropagation();
            const dx = e.clientX - lastMouseX;
            const dy = e.clientY - lastMouseY;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;

            yaw += mouseDirection * dx * mouseSensitivity;
            pitch = clamp(pitch + mouseDirection * dy * mouseSensitivity, -pitchLimit, pitchLimit);
            applyFirstPersonLook();
        }, true);

        modeButtons.forEach((button) => {
            button.addEventListener('click', () => setMode(button.dataset.mode));
        });
        buildPanelLists();

        function lerpAngle(a, b, t) {
            let diff = ((b - a + Math.PI) % (Math.PI * 2)) - Math.PI;
            return a + diff * t;
        }

        function updateTour(dt) {
            if (!viewer.camera || tourRoute.length < 2) return;
            const start = tourRoute[tourSegment];
            const end = tourRoute[(tourSegment + 1) % tourRoute.length];
            tourProgress += dt / end.duration;
            if (tourProgress >= 1) {
                tourSegment = (tourSegment + 1) % tourRoute.length;
                tourProgress = 0;
                if (typeof end.poi === 'number') selectPOI(end.poi, true);
            }

            const t = tourProgress * tourProgress * (3 - 2 * tourProgress);
            const startPos = new THREE.Vector3().fromArray(start.position);
            const endPos = new THREE.Vector3().fromArray(end.position);
            viewer.camera.position.copy(startPos.lerp(endPos, t));
            lockedHeight = viewer.camera.position.y;
            yaw = lerpAngle(start.yaw, end.yaw, t);
            pitch = THREE.MathUtils.lerp(start.pitch || 0, end.pitch || 0, t);
            roll = 0;
            applyFirstPersonLook();
        }

        function drawRadar() {
            if (!viewer.camera) return;
            const w = radarCanvas.width;
            const h = radarCanvas.height;
            const cx = w / 2;
            const cy = h / 2;
            const scale = 9;
            radarCtx.clearRect(0, 0, w, h);
            radarCtx.fillStyle = 'rgba(0,0,0,0.35)';
            radarCtx.fillRect(0, 0, w, h);
            radarCtx.strokeStyle = 'rgba(255,255,255,0.12)';
            radarCtx.lineWidth = 1;
            for (let r = 24; r <= 60; r += 18) {
                radarCtx.beginPath();
                radarCtx.arc(cx, cy, r, 0, Math.PI * 2);
                radarCtx.stroke();
            }

            const cam = viewer.camera.position;
            radarCtx.fillStyle = '#fbbf24';
            pois.forEach((poi) => {
                const x = cx + (poi.position.x - cam.x) * scale;
                const y = cy + (poi.position.z - cam.z) * scale;
                if (x < 6 || x > w - 6 || y < 6 || y > h - 6) return;
                radarCtx.beginPath();
                radarCtx.arc(x, y, 3, 0, Math.PI * 2);
                radarCtx.fill();
            });

            radarCtx.save();
            radarCtx.translate(cx, cy);
            radarCtx.rotate(-yaw);
            radarCtx.fillStyle = '#60a5fa';
            radarCtx.beginPath();
            radarCtx.moveTo(0, -12);
            radarCtx.lineTo(7, 9);
            radarCtx.lineTo(0, 5);
            radarCtx.lineTo(-7, 9);
            radarCtx.closePath();
            radarCtx.fill();
            radarCtx.restore();
        }

        function updateMovement(dt) {
            if (!viewer.camera || !viewer.controls) return;

            const camera = viewer.camera;
            const isShift = keys['Shift'] || keys['ShiftLeft'] || keys['ShiftRight'];
            const speed = isShift ? moveSpeedFast : moveSpeedNormal;
            if (keys['q'] || keys['Q']) lockedHeight += heightStep;
            if (keys['e'] || keys['E']) lockedHeight -= heightStep;
            if (keys['z'] || keys['Z']) roll -= rollSpeed;
            if (keys['c'] || keys['C']) roll += rollSpeed;
            if (keys['x'] || keys['X']) roll = 0;

            if (appMode === 'tour') {
                updateTour(dt);
                drawRadar();
                return;
            }

            // 第一人称平面移动：前后左右只看水平 yaw，不受抬头/低头影响。
            tmpForward.set(Math.sin(yaw), 0, Math.cos(yaw));
            tmpForward.normalize();
            tmpRight.crossVectors(tmpForward, camera.up);
            tmpRight.y = 0;
            if (tmpRight.lengthSq() < 0.0001) {
                tmpRight.set(-Math.cos(yaw), 0, Math.sin(yaw));
            }
            tmpRight.normalize();

            let moved = false;
            tmpVec.set(0, 0, 0);

            if (keys['w'] || keys['W']) {
                tmpVec.addScaledVector(tmpForward, speed);
                moved = true;
            }
            if (keys['s'] || keys['S']) {
                tmpVec.addScaledVector(tmpForward, -speed);
                moved = true;
            }
            if (keys['a'] || keys['A']) {
                tmpVec.addScaledVector(tmpRight, -speed);
                moved = true;
            }
            if (keys['d'] || keys['D']) {
                tmpVec.addScaledVector(tmpRight, speed);
                moved = true;
            }

            if (moved) {
                camera.position.add(tmpVec);
            }

            camera.position.y = lockedHeight;
            applyFirstPersonLook();

            // 更新 HUD
            document.getElementById('pos-x').textContent = camera.position.x.toFixed(2);
            document.getElementById('pos-y').textContent = camera.position.y.toFixed(2);
            document.getElementById('pos-z').textContent = camera.position.z.toFixed(2);

            const camDir = new THREE.Vector3();
            camera.getWorldDirection(camDir);
            document.getElementById('compass').textContent = getCompassHeading(camDir);
            document.getElementById('speed-indicator').textContent = isShift ? '加速 ⚡' : '正常';
            document.getElementById('speed-indicator').style.color = isShift ? '#f87171' : '#fbbf24';
            drawRadar();
        }

        // ===== 启动游戏循环 =====
        function gameLoop() {
            requestAnimationFrame(gameLoop);
            const now = performance.now();
            const dt = Math.min((now - lastFrameTime) / 1000, 0.1);
            lastFrameTime = now;
            updateMovement(dt);
        }

        // ===== 加载场景 =====
        viewer.addSplatScene('./models/train.ply', {
            'splatAlphaRemovalThreshold': 5,
            'showLoadingUI': false,
            'position': [0, 0, 0],
            'rotation': [0, 0, 0, 1],
            'scale': [1, 1, 1]
        })
        .then(() => {
            loading.style.display = 'none';
            viewer.start();
            lockedHeight = viewer.camera.position.y;
            if (viewer.controls) {
                viewer.controls.enableRotate = false;
                viewer.controls.enablePan = false;
                viewer.controls.enableZoom = false;
                viewer.controls.enableDamping = false;
            }
            syncLookAnglesFromCamera();
            applyFirstPersonLook();
            createPOIMarkers();
            gameLoop();
            showToast('拖动鼠标转头 · WASD 平面移动');
        })
        .catch((err) => {
            loading.innerHTML = '<div style="color:#ff6b6b">加载失败: ' + err.message + '</div>';
            console.error(err);
        });
    </script>
</body>
</html>
